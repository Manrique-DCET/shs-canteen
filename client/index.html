<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHS Canteen Kiosk - Store Selection</title>
    <meta name="description" content="Select a store to order from at the UPHSL SHS Canteen">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/kiosk.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        .store-selection-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .store-header {
            margin-bottom: 3rem;
            color: var(--text-main);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--uphsd-gold-dark);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .store-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .store-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--uphsd-gold);
        }

        .store-image-container {
            height: 160px;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--uphsd-navy);
            color: var(--uphsd-navy);
            font-size: 3rem;
        }

        .store-info {
            padding: 1.5rem;
            text-align: center;
            background: white;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            text-transform: capitalize;
        }
    </style>
</head>

<body class="kiosk-body" style="overflow-y: auto;">
    <!-- Main Kiosk Layout -->
    <div class="kiosk-layout" style="display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto;">
        <header class="kiosk-header glass-panel">
            <div class="logo-container mb-0 pb-0 border-0">
                <h1 class="logo-text">Store <span class="text-gold">Selection</span></h1>
            </div>
            <div class="student-profile" id="current-student">
                <span>Welcome, Student</span>
                <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Exit</button>
                <button class="btn btn-sm btn-gold ml-2" id="view-feedbacks-btn"><i class="fa-solid fa-star"></i>
                    Feedbacks</button>
            </div>
        </header>

        <main class="store-selection-container" style="padding-top: 2rem; flex: 1; overflow-y: visible;">
            <h1 class="store-header">UPSHL SHS CANTEEN</h1>

            <div class="stores-grid" id="stores-grid">
                <!-- Store Cards Will Be Injected Here -->
            </div>
        </main>
    </div>

    <!-- Feedbacks Viewer Modal -->
    <div id="feedbacks-viewer-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content"
            style="max-width: 600px; width: 90%; max-height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header d-flex justify-content-between align-items-center mb-3">
                <h3 class="m-0"><i class="fa-solid fa-comments text-gold"></i> Student Feedbacks</h3>
                <button class="btn-close" id="close-feedbacks-viewer"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div id="feedbacks-list-container"
                style="flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 1rem;">
                <!-- Feedbacks injected here -->
                <div class="text-center text-muted" style="padding: 2rem;">
                    <i class="fa-solid fa-spinner fa-spin fa-2x mb-3 text-navy"></i>
                    <p>Loading feedbacks...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Check Auth
        const storedUser = localStorage.getItem('canteen_student');
        if (!storedUser) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(storedUser);
            const studentDisplay = document.getElementById('current-student');
            if (studentDisplay) {
                studentDisplay.innerHTML = `<span>Welcome, <strong>${user.name}</strong></span> <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Exit</button>`;
            }

            document.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'student-logout-btn') {
                    localStorage.removeItem('canteen_student');
                    window.location.href = 'login.html';
                }
            });
        }
        const stores = [
            "Burger and Footlong Bites",
            "Chicking Eat",
            "Fresh Fruit Shake",
            "Fried Noodles",
            "Ganza Au",
            "Loveshot Coffee & Pastries",
            "Potato Roll",
            "Silog Meals",
            "Takoyaki",
            "Tender Juicy",
            "Waffle Time"
        ];

        const generateStoreCards = () => {
            const grid = document.getElementById('stores-grid');
            stores.forEach(store => {
                const encodedStore = encodeURIComponent(store);

                // Fallback icons simply for visual distinction pending actual images
                let iconClass = "fa-store";
                const lowerName = store.toLowerCase();
                if (lowerName.includes("burger")) iconClass = "fa-burger";
                if (lowerName.includes("chicken") || lowerName.includes("chicking")) iconClass = "fa-drumstick-bite";
                if (lowerName.includes("fruit") || lowerName.includes("shake")) iconClass = "fa-blender";
                if (lowerName.includes("noodle")) iconClass = "fa-bowl-food";
                if (lowerName.includes("coffee") || lowerName.includes("pastries")) iconClass = "fa-mug-hot";
                if (lowerName.includes("potato")) iconClass = "fa-hotdog"; // Close enough
                if (lowerName.includes("silog")) iconClass = "fa-egg";
                if (lowerName.includes("takoyaki")) iconClass = "fa-circle";
                if (lowerName.includes("juicy")) iconClass = "fa-hotdog";
                if (lowerName.includes("waffle")) iconClass = "fa-stroopwafel";
                if (lowerName.includes("ganza")) iconClass = "fa-utensils";

                const cardHTML = `
                    <a href="store.html?stall=${encodedStore}" class="store-card">
                        <div class="store-image-container">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <div class="store-info">
                            <h3 class="store-name">${store}</h3>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateStoreCards();

            // Setup Feedbacks Modal Logic
            const viewFeedbacksBtn = document.getElementById('view-feedbacks-btn');
            const closeFeedbacksBtn = document.getElementById('close-feedbacks-viewer');
            const feedbacksModal = document.getElementById('feedbacks-viewer-modal');
            const feedbacksContainer = document.getElementById('feedbacks-list-container');

            if (viewFeedbacksBtn && feedbacksModal) {
                viewFeedbacksBtn.addEventListener('click', async () => {
                    feedbacksModal.classList.remove('hidden');

                    try {
                        // Assuming window.config.apiUrl exists or fallback to the known base URL
                        const apiUrl = (window.config && window.config.apiUrl) ? window.config.apiUrl : 'https://shs-canteen.onrender.com/api';
                        const response = await fetch(`${apiUrl}/reviews`);

                        if (!response.ok) throw new Error('Failed to fetch feedbacks');

                        const reviews = await response.json();

                        if (reviews.length === 0) {
                            feedbacksContainer.innerHTML = `
                                <div class="text-center text-muted" style="padding: 2rem;">
                                    <i class="fa-regular fa-comment-dots fa-3x mb-3"></i>
                                    <p>No feedbacks available yet.</p>
                                </div>
                            `;
                            return;
                        }

                        // Render Feedbacks
                        feedbacksContainer.innerHTML = reviews.map(review => {
                            const date = new Date(review.createdAt).toLocaleDateString('en-US', {
                                year: 'numeric', month: 'short', day: 'numeric'
                            });

                            // Generate Stars
                            let starsHtml = '';
                            const rating = parseInt(review.rating) || 5;
                            for (let i = 1; i <= 5; i++) {
                                if (i <= rating) {
                                    starsHtml += '<i class="fa-solid fa-star text-gold" style="color: #fbbf24;"></i>';
                                } else {
                                    starsHtml += '<i class="fa-regular fa-star" style="color: #d1d5db;"></i>';
                                }
                            }

                            // Determine Target (Store Name or specific product)
                            let targetInfo = '';
                            if (review.stallName) {
                                targetInfo = `<span style="font-size: 0.85rem; background: var(--bg-main); padding: 0.2rem 0.5rem; border-radius: 4px; color: var(--uphsd-navy);"><i class="fa-solid fa-store"></i> ${review.stallName}</span>`;
                            }

                            return `
                                <div class="feedback-card" style="background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0,0,0,0.05); border-radius: 8px; padding: 1rem; text-align: left;">
                                    <div class="d-flex justify-content-between align-items-start mb-2" style="display: flex; justify-content: space-between;">
                                        <div>
                                            <div style="font-weight: 600; color: var(--uphsd-navy);">
                                                ${review.user && review.user.name ? review.user.name : 'Anonymous Student'}
                                            </div>
                                            <div class="stars" style="font-size: 0.9rem; margin-top: 2px;">
                                                ${starsHtml}
                                            </div>
                                        </div>
                                        <div style="font-size: 0.8rem; color: #6b7280;">${date}</div>
                                    </div>
                                    <p style="margin: 0.5rem 0; color: var(--text-main); font-size: 0.95rem;">
                                        "${review.comment || 'No comment provided.'}"
                                    </p>
                                    ${targetInfo ? `<div style="margin-top: 0.5rem; text-align: right;">${targetInfo}</div>` : ''}
                                </div>
                            `;
                        }).join('');

                    } catch (error) {
                        console.error('Error loading feedbacks:', error);
                        feedbacksContainer.innerHTML = `
                            <div class="text-center text-danger" style="padding: 2rem;">
                                <i class="fa-solid fa-triangle-exclamation fa-2x mb-3 text-danger"></i>
                                <p>Failed to load feedbacks. Please try again later.</p>
                            </div>
                        `;
                    }
                });
            }

            if (closeFeedbacksBtn && feedbacksModal) {
                closeFeedbacksBtn.addEventListener('click', () => {
                    feedbacksModal.classList.add('hidden');
                });
            }

            // Close on outside click
            if (feedbacksModal) {
                feedbacksModal.addEventListener('click', (e) => {
                    if (e.target === feedbacksModal) {
                        feedbacksModal.classList.add('hidden');
                    }
                });
            }
        });
    </script>
</body>

</html>
