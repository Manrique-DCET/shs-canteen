<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHS Canteen Kiosk - Store Selection</title>
    <meta name="description" content="Select a store to order from at the UPHSL SHS Canteen">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/kiosk.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .store-selection-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .store-header {
            margin-bottom: 3rem;
            color: var(--text-dark);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--primary-gold);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .store-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .store-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-gold);
        }

        .store-image-container {
            height: 160px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--primary-navy);
            color: var(--primary-navy);
            font-size: 3rem;
        }

        .store-info {
            padding: 1.5rem;
            text-align: center;
            background: white;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            text-transform: capitalize;
        }
    </style>
</head>

<body class="kiosk-body" style="overflow-y: auto;">
    <!-- Main Kiosk Layout -->
    <div class="kiosk-layout" style="display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto;">
        <header class="kiosk-header glass-panel">
            <div class="logo-container mb-0 pb-0 border-0">
                <h1 class="logo-text">Store <span class="text-gold">Selection</span></h1>
            </div>
            <div class="student-profile" id="current-student">
                <span>Welcome, Student</span>
                <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Exit</button>
                <button class="btn btn-sm btn-gold ml-2" id="feedback-btn"><i class="fa-solid fa-star"></i>
                    Feedback</button>
            </div>
        </header>

        <main class="store-selection-container" style="padding-top: 2rem; flex: 1; overflow-y: visible;">
            <h1 class="store-header">UPSHL SHS CANTEEN</h1>

            <div class="stores-grid" id="stores-grid">
                <!-- Store Cards Will Be Injected Here -->
            </div>
        </main>
    </div>

    <!-- Student Feedback Modal -->
    <div id="feedback-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content" style="background: white; border-radius: 1rem; padding: 2rem;">
            <div class="modal-header d-flex justify-content-between align-items-center mb-3">
                <h3 class="m-0">Leave Feedback</h3>
                <button class="btn-close" id="close-feedback-modal"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="student-feedback-form">
                <div class="form-group mb-3 text-center">
                    <label class="d-block mb-2">Rate your experience</label>
                    <div class="star-rating" id="star-rating" style="font-size: 2rem; color: #d1d5db; cursor: pointer;">
                        <i class="fa-solid fa-star" data-rating="1"></i>
                        <i class="fa-solid fa-star" data-rating="2"></i>
                        <i class="fa-solid fa-star" data-rating="3"></i>
                        <i class="fa-solid fa-star" data-rating="4"></i>
                        <i class="fa-solid fa-star" data-rating="5"></i>
                    </div>
                    <input type="hidden" id="feedback-rating" value="0" required>
                </div>
                <div class="form-group mb-4">
                    <label>Comments or Suggestions?</label>
                    <textarea id="feedback-comment" class="form-control" rows="4"
                        placeholder="Tell us how we can improve our canteen..." style="resize: none;"></textarea>
                </div>
                <button type="submit" class="btn btn-gold btn-lg w-100" id="submit-feedback-btn">
                    Submit Feedback
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check Auth
        const storedUser = localStorage.getItem('canteen_student');
        if (!storedUser) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(storedUser);
            const studentDisplay = document.getElementById('current-student');
            if (studentDisplay) {
                studentDisplay.innerHTML = `<span>Welcome, <strong>${user.name}</strong></span> <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Log out</button>`;
            }

            document.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'student-logout-btn') {
                    localStorage.removeItem('canteen_student');
                    window.location.href = 'login.html';
                }
            });
        }

        // Global config
        window.config = { apiUrl: 'https://shs-canteen.onrender.com/api' };

        // Feedback Logic
        const feedbackBtn = document.getElementById('feedback-btn');
        const feedbackModal = document.getElementById('feedback-modal');
        const closeFeedbackBtn = document.getElementById('close-feedback-modal');
        const feedbackForm = document.getElementById('student-feedback-form');
        const stars = document.querySelectorAll('#star-rating i');
        const ratingInput = document.getElementById('feedback-rating');
        const feedbackComment = document.getElementById('feedback-comment');
        const submitFeedbackBtn = document.getElementById('submit-feedback-btn');

        if (feedbackBtn) {
            feedbackBtn.addEventListener('click', () => feedbackModal.classList.remove('hidden'));
        }

        if (closeFeedbackBtn) {
            closeFeedbackBtn.addEventListener('click', () => {
                feedbackModal.classList.add('hidden');
                ratingInput.value = 0;
                stars.forEach(s => s.classList.remove('selected', 'hovered'));
                feedbackComment.value = '';
            });
        }

        stars.forEach(star => {
            star.addEventListener('mouseover', (e) => {
                const rating = e.target.dataset.rating;
                stars.forEach(s => {
                    s.classList.toggle('hovered', s.dataset.rating <= rating);
                });
            });

            star.addEventListener('mouseout', () => {
                stars.forEach(s => s.classList.remove('hovered'));
                const val = ratingInput.value;
                stars.forEach(s => {
                    s.classList.toggle('selected', s.dataset.rating <= val);
                });
            });

            star.addEventListener('click', (e) => {
                ratingInput.value = e.target.dataset.rating;
            });
        });

        if (feedbackForm) {
            feedbackForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const rating = parseInt(ratingInput.value);
                const comment = feedbackComment.value.trim();

                if (rating === 0) return alert('Please select a star rating.');

                submitFeedbackBtn.disabled = true;
                submitFeedbackBtn.innerHTML = 'Submitting...';

                try {
                    const reqBody = {
                        userId: JSON.parse(storedUser)._id,
                        rating,
                        comment,
                        productId: null // General canteen feedback
                    };

                    const res = await fetch(`${window.config.apiUrl}/reviews`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reqBody)
                    });

                    if (!res.ok) throw new Error('Feedback submission failed');

                    alert('Thank you for your feedback! 🌟');
                    closeFeedbackBtn.click();
                } catch (error) {
                    console.error('Feedback error:', error);
                    alert('Failed to submit feedback. Please try again.');
                } finally {
                    submitFeedbackBtn.disabled = false;
                    submitFeedbackBtn.innerHTML = 'Submit Feedback';
                }
            });
        }
        const stores = [
            "Burger and Footlong Bites",
            "Chicking Eat",
            "Fresh Fruit Shake",
            "Fried Noodles",
            "Ganza Au",
            "Loveshot Coffee & Pastries",
            "Potato Roll",
            "Silog Meals",
            "Takoyaki",
            "Tender Juicy",
            "Waffle Time"
        ];

        const generateStoreCards = () => {
            const grid = document.getElementById('stores-grid');
            stores.forEach(store => {
                const encodedStore = encodeURIComponent(store);

                // Fallback icons simply for visual distinction pending actual images
                let iconClass = "fa-store";
                const lowerName = store.toLowerCase();
                if (lowerName.includes("burger")) iconClass = "fa-burger";
                if (lowerName.includes("chicken") || lowerName.includes("chicking")) iconClass = "fa-drumstick-bite";
                if (lowerName.includes("fruit") || lowerName.includes("shake")) iconClass = "fa-blender";
                if (lowerName.includes("noodle")) iconClass = "fa-bowl-food";
                if (lowerName.includes("coffee") || lowerName.includes("pastries")) iconClass = "fa-mug-hot";
                if (lowerName.includes("potato")) iconClass = "fa-hotdog"; // Close enough
                if (lowerName.includes("silog")) iconClass = "fa-egg";
                if (lowerName.includes("takoyaki")) iconClass = "fa-circle";
                if (lowerName.includes("juicy")) iconClass = "fa-hotdog";
                if (lowerName.includes("waffle")) iconClass = "fa-stroopwafel";
                if (lowerName.includes("ganza")) iconClass = "fa-utensils";

                const cardHTML = `
                    <a href="store.html?stall=${encodedStore}" class="store-card">
                        <div class="store-image-container">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <div class="store-info">
                            <h3 class="store-name">${store}</h3>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', generateStoreCards);
    </script>
</body>

</html>
