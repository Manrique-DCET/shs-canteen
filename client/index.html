<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHS Canteen Kiosk - Order Here</title>
    <meta name="description" content="Order your meals easily at the UPHSL SHS Canteen Kiosk">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/kiosk.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/toast.css">
</head>

<body class="kiosk-body">
    <!-- Main Kiosk Layout -->
    <div class="kiosk-layout">
        <!-- Main Area -->
        <main class="kiosk-main">
            <header class="kiosk-header glass-panel">
                <div class="logo-container mb-0 pb-0 border-0">
                    <h1 class="logo-text">Order <span class="text-gold">Here</span></h1>
                </div>
                <div class="student-profile" id="current-student">
                    <span>Welcome, Student</span>
                    <button class="btn btn-sm btn-outline" id="student-logout-btn">Exit</button>
                    <button class="btn btn-sm btn-gold ml-2" id="feedback-btn"><i class="fa-solid fa-star"></i>
                        Feedback</button>
                </div>
            </header>

            <div class="categories-bar">
                <button class="category-btn active" data-category="All">All Items</button>
                <button class="category-btn" data-category="Meals">Meals</button>
                <button class="category-btn" data-category="Snacks">Snacks</button>
                <button class="category-btn" data-category="Drinks">Drinks</button>
            </div>

            <div class="menu-grid" id="menu-grid">
                <!-- Products dynamically loaded here -->
                <div class="text-center text-muted" style="grid-column: 1 / -1; padding: 3rem;">
                    <i class="fa-solid fa-spinner fa-spin fa-3x mb-3 text-navy"></i>
                    <h2>Loading delicious food...</h2>
                </div>
            </div>
        </main>

        <!-- Mobile Cart Toggle Button -->
        <button class="mobile-cart-toggle" id="mobile-cart-toggle">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="mobile-cart-badge" id="mobile-cart-badge">0</span>
        </button>

        <!-- Cart Sidebar -->
        <aside class="cart-sidebar glass-panel" id="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fa-solid fa-basket-shopping"></i> Your Tray</h3>
                <div class="cart-header-actions">
                    <span class="badge badge-pending" id="cart-count">0 items</span>
                    <button class="close-cart-btn" id="close-cart-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <div class="cart-items" id="cart-items-container">
                <!-- Cart empty state -->
                <div class="empty-cart text-center text-muted mt-5">
                    <i class="fa-solid fa-tray fa-3x mb-3"></i>
                    <p>Your tray is empty.<br>Add some delicious food!</p>
                </div>
            </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total Amount</span>
                    <h2 id="cart-total-amount" class="text-navy">₱0.00</h2>
                </div>
                <button class="btn btn-gold btn-lg w-100" id="checkout-btn" disabled>
                    Proceed to Checkout <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </aside>
    </div>

    <!-- Order Processing Modal -->
    <div id="order-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content text-center">
            <div id="order-status-view">
                <div class="success-icon mb-3">
                    <i class="fa-regular fa-circle-check text-success fa-4x"></i>
                </div>
                <h2 class="mb-2">Order Received!</h2>
                <p class="mb-4 text-muted">Please wait while your food is being prepared. We will send an email when it
                    is ready to serve.</p>
                <div class="order-number-box mb-4 bg-gradient-navy text-white p-3 rounded">
                    <span>Order Number</span>
                    <h1 class="m-0 text-gold" id="display-order-id">#1024</h1>
                </div>
                <button class="btn btn-primary btn-lg w-100" id="close-order-modal">Return to Menu</button>
            </div>
        </div>
    </div>

    <!-- Student Feedback Modal -->
    <div id="feedback-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <div class="modal-header d-flex justify-content-between align-items-center mb-3">
                <h3 class="m-0">Leave Feedback</h3>
                <button class="btn-close" id="close-feedback-modal"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="student-feedback-form">
                <div class="form-group mb-3 text-center">
                    <label class="d-block mb-2">Rate your experience</label>
                    <div class="star-rating" id="star-rating" style="font-size: 2rem; color: #d1d5db; cursor: pointer;">
                        <i class="fa-solid fa-star" data-rating="1"></i>
                        <i class="fa-solid fa-star" data-rating="2"></i>
                        <i class="fa-solid fa-star" data-rating="3"></i>
                        <i class="fa-solid fa-star" data-rating="4"></i>
                        <i class="fa-solid fa-star" data-rating="5"></i>
                    </div>
                    <input type="hidden" id="feedback-rating" value="0" required>
                </div>
                <div class="form-group mb-4">
                    <label>Comments or Suggestions?</label>
                    <textarea id="feedback-comment" class="form-control" rows="4"
                        placeholder="Tell us how we can improve..." style="resize: none;"></textarea>
                </div>
                <button type="submit" class="btn btn-gold btn-lg w-100" id="submit-feedback-btn">
                    Submit Feedback
                </button>
            </form>
        </div>
    </div>

    <script>
        // Global configuration
        window.config = {
            apiUrl: 'https://shs-canteen.onrender.com/api' // Use Render backend
        };
    </script>
    <script src="./js/toast.js"></script>
    <script src="./js/kiosk.js"></script>
</body>

</html>
