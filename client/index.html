<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHS Canteen Kiosk - Store Selection</title>
    <meta name="description" content="Select a store to order from at the UPHSL SHS Canteen">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/kiosk.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .store-selection-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        .store-header {
            margin-bottom: 3rem;
            color: var(--text-dark);
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--primary-gold);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .store-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .store-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-gold);
        }

        .store-image-container {
            height: 160px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--primary-navy);
            color: var(--primary-navy);
            font-size: 3rem;
        }

        .store-info {
            padding: 1.5rem;
            text-align: center;
            background: white;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            text-transform: capitalize;
        }
    </style>
</head>

<body class="kiosk-body" style="overflow-y: auto;">
    <!-- Main Kiosk Layout -->
    <div class="kiosk-layout" style="display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto;">
        <header class="kiosk-header glass-panel">
            <div class="logo-container mb-0 pb-0 border-0">
                <h1 class="logo-text">Store <span class="text-gold">Selection</span></h1>
            </div>
            <div class="student-profile" id="current-student">
                <span>Welcome, Student</span>
                <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Exit</button>
            </div>
        </header>

        <main class="store-selection-container" style="padding-top: 2rem; flex: 1; overflow-y: visible;">
            <h1 class="store-header">UPSHL SHS CANTEEN</h1>

            <div class="stores-grid" id="stores-grid">
                <!-- Store Cards Will Be Injected Here -->
            </div>
        </main>
    </div>

    <script>
        // Check Auth
        const storedUser = localStorage.getItem('canteen_student');
        if (!storedUser) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(storedUser);
            const studentDisplay = document.getElementById('current-student');
            if (studentDisplay) {
                studentDisplay.innerHTML = `<span>Welcome, <strong>${user.name}</strong></span> <button class="btn btn-sm btn-outline ml-2" id="student-logout-btn">Log out</button>`;
            }

            document.addEventListener('click', (e) => {
                if (e.target && e.target.id === 'student-logout-btn') {
                    localStorage.removeItem('canteen_student');
                    window.location.href = 'login.html';
                }
            });
        }
        const stores = [
            "Burger and Footlong Bites",
            "Chicking Eat",
            "Fresh Fruit Shake",
            "Fried Noodles",
            "Ganza Au",
            "Loveshot Coffee & Pastries",
            "Potato Roll",
            "Silog Meals",
            "Takoyaki",
            "Tender Juicy",
            "Waffle Time"
        ];

        const generateStoreCards = () => {
            const grid = document.getElementById('stores-grid');
            stores.forEach(store => {
                const encodedStore = encodeURIComponent(store);

                // Fallback icons simply for visual distinction pending actual images
                let iconClass = "fa-store";
                const lowerName = store.toLowerCase();
                if (lowerName.includes("burger")) iconClass = "fa-burger";
                if (lowerName.includes("chicken") || lowerName.includes("chicking")) iconClass = "fa-drumstick-bite";
                if (lowerName.includes("fruit") || lowerName.includes("shake")) iconClass = "fa-blender";
                if (lowerName.includes("noodle")) iconClass = "fa-bowl-food";
                if (lowerName.includes("coffee") || lowerName.includes("pastries")) iconClass = "fa-mug-hot";
                if (lowerName.includes("potato")) iconClass = "fa-hotdog"; // Close enough
                if (lowerName.includes("silog")) iconClass = "fa-egg";
                if (lowerName.includes("takoyaki")) iconClass = "fa-circle";
                if (lowerName.includes("juicy")) iconClass = "fa-hotdog";
                if (lowerName.includes("waffle")) iconClass = "fa-stroopwafel";
                if (lowerName.includes("ganza")) iconClass = "fa-utensils";

                const cardHTML = `
                    <a href="store.html?stall=${encodedStore}" class="store-card">
                        <div class="store-image-container">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <div class="store-info">
                            <h3 class="store-name">${store}</h3>
                        </div>
                    </a>
                `;
                grid.innerHTML += cardHTML;
            });
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', generateStoreCards);
    </script>
</body>

</html>
